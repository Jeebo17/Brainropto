<!DOCTYPE html>
<html>
<head>
  <title>Gesture Test - Webcam (Pose)</title>
  <style>
    body { font-family: sans-serif; margin: 20px; background: #1a1a1a; color: #fff; }
    video { border-radius: 8px; }
    canvas { border-radius: 8px; }
    #status { font-size: 24px; margin: 16px 0; }
    .gesture-alert {
      display: none;
      font-size: 48px;
      font-weight: bold;
      padding: 20px;
      border: 4px solid;
      border-radius: 12px;
      text-align: center;
      animation: pulse 0.5s ease-in-out;
      margin-bottom: 8px;
    }
    #alert-67 { color: #22c55e; border-color: #22c55e; }
    #alert-rickroll { color: #f43f5e; border-color: #f43f5e; }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    #debug { font-size: 14px; color: #999; margin-top: 12px; }
    .container { display: flex; gap: 20px; flex-wrap: wrap; }
    .panel { background: #2a2a2a; padding: 16px; border-radius: 8px; display: inline-block; }
    .video-wrap { position: relative; display: inline-block; }
  </style>
</head>
<body>
  <h1>Gesture Detection Test — PoseLandmarker (Webcam)</h1>
  <p><b>67:</b> Both hands pumping up and down in opposite directions (2 pumps in 5 seconds)</p>
  <p><b>Rickroll:</b> Both hands moving side to side (2 sweeps in 5 seconds)</p>

  <div id="alert-67" class="gesture-alert">67 DETECTED!</div>
  <div id="alert-rickroll" class="gesture-alert">RICKROLL DETECTED!</div>

  <div class="container">
    <div class="panel">
      <h3>Webcam Feed + Pose Overlay</h3>
      <div class="video-wrap">
        <video id="webcam" width="640" height="480" autoplay muted playsinline></video>
        <canvas id="overlay" width="640" height="480" style="position: absolute; top: 0; left: 0; pointer-events: none;"></canvas>
      </div>
    </div>
  </div>

  <div id="status">Status: Loading PoseLandmarker model...</div>
  <div id="debug"></div>
  <div id="log" style="margin-top: 16px; font-size: 14px; max-height: 200px; overflow-y: auto;"></div>

  <script type="module">
    import { PoseLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs';

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const debugEl = document.getElementById('debug');
    const logEl = document.getElementById('log');
    const alert67 = document.getElementById('alert-67');
    const alertRickroll = document.getElementById('alert-rickroll');

    // Pose landmark indices
    const LEFT_WRIST = 15;
    const RIGHT_WRIST = 16;

    // -- Gesture detection config --
    const GESTURE_WINDOW_MS = 3000;
    const MIN_DISPLACEMENT_Y_RATIO = 0.15; // proportion of torso height
    const MIN_DISPLACEMENT_X_RATIO = 0.20;
    const MIN_DISPLACEMENT_Y_FALLBACK = 0.10;
    const MIN_DISPLACEMENT_X_FALLBACK = 0.08;
    const REQUIRED_REVERSALS = 4;
    const COOLDOWN_MS = 3000;
    const MIN_ABOVE_HIP_RATIO = 0.6;
    const HIP_MARGIN_RATIO = 0.1;

    const LEFT_SHOULDER = 11, RIGHT_SHOULDER = 12, LEFT_HIP = 23, RIGHT_HIP = 24;

    const wristHistories = [[], []]; // [left wrist, right wrist]
    let lastGestureTime = { '67': 0, 'rickroll': 0 };

    function countReversals(values, minDisplacement) {
      if (values.length < 3) return 0;
      let reversals = 0;
      let lastDir = null;
      let lastAnchor = values[0];

      for (let i = 1; i < values.length; i++) {
        const delta = values[i] - lastAnchor;
        if (Math.abs(delta) < minDisplacement) continue;
        const dir = delta > 0 ? 'up' : 'down';
        if (lastDir !== null && dir !== lastDir) {
          reversals++;
        }
        lastDir = dir;
        lastAnchor = values[i];
      }
      return reversals;
    }

    function checkBelowShoulderRatio(history, torsoHeight) {
      if (history.length < 3) return false;
      const margin = torsoHeight > 0.01 ? torsoHeight * HIP_MARGIN_RATIO : 0.02;
      const belowCount = history.filter(p =>
        p.shoulderMidY !== undefined && p.y >= p.shoulderMidY - margin
      ).length;
      return belowCount / history.length >= MIN_ABOVE_HIP_RATIO;
    }

    function addLog(msg) {
      const line = document.createElement('div');
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.prepend(line);
      if (logEl.children.length > 50) logEl.lastChild.remove();
    }

    function showAlert(type) {
      const el = type === '67' ? alert67 : alertRickroll;
      el.style.display = 'block';
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = 'pulse 0.5s ease-in-out';
      setTimeout(() => { el.style.display = 'none'; }, 2000);
    }

    // -- Init PoseLandmarker --
    async function start() {
      try {
        statusEl.textContent = 'Status: Loading model (may take a few seconds)...';

        const vision = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm'
        );

        const poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath:
              'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task',
            delegate: 'GPU',
          },
          runningMode: 'VIDEO',
          numPoses: 1,
          minPoseDetectionConfidence: 0.3,
          minPosePresenceConfidence: 0.3,
          minTrackingConfidence: 0.3,
        });

        statusEl.textContent = 'Status: Model loaded, starting webcam...';

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480 },
        });
        video.srcObject = stream;

        video.addEventListener('loadeddata', () => {
          statusEl.textContent = 'Status: Tracking pose...';
          addLog('Webcam started, PoseLandmarker loaded');

          function loop() {
            if (video.readyState >= 2) {
              const result = poseLandmarker.detectForVideo(video, performance.now());
              processResults(result.landmarks);
            }
            requestAnimationFrame(loop);
          }
          loop();
        });
      } catch (err) {
        statusEl.textContent = `Status: Error — ${err.message}`;
        console.error(err);
      }
    }

    function processResults(poseLandmarks) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!poseLandmarks || poseLandmarks.length === 0) {
        statusEl.textContent = 'Status: No pose detected';
        return;
      }

      const now = Date.now();
      const pose = poseLandmarks[0];
      const leftWrist = pose[LEFT_WRIST];
      const rightWrist = pose[RIGHT_WRIST];
      const wrists = [leftWrist, rightWrist];

      // Compute torso height for proportional thresholds
      const shoulderMidY = (pose[LEFT_SHOULDER].y + pose[RIGHT_SHOULDER].y) / 2;
      const hipMidY = (pose[LEFT_HIP].y + pose[RIGHT_HIP].y) / 2;
      const torsoHeight = Math.abs(hipMidY - shoulderMidY);
      const hasTorso = torsoHeight > 0.01;
      const minDispY = hasTorso ? torsoHeight * MIN_DISPLACEMENT_Y_RATIO : MIN_DISPLACEMENT_Y_FALLBACK;
      const minDispX = hasTorso ? torsoHeight * MIN_DISPLACEMENT_X_RATIO : MIN_DISPLACEMENT_X_FALLBACK;

      // Draw all 33 pose landmarks
      for (const point of pose) {
        ctx.beginPath();
        ctx.arc(point.x * canvas.width, point.y * canvas.height, 3, 0, 2 * Math.PI);
        ctx.fillStyle = '#60a5fa';
        ctx.fill();
      }

      // Draw skeleton connections (simplified)
      const connections = [
        [11, 12], [11, 13], [13, 15], [12, 14], [14, 16], // arms
        [11, 23], [12, 24], [23, 24], // torso
        [23, 25], [25, 27], [24, 26], [26, 28], // legs
      ];
      ctx.strokeStyle = '#60a5fa';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.4;
      for (const [a, b] of connections) {
        ctx.beginPath();
        ctx.moveTo(pose[a].x * canvas.width, pose[a].y * canvas.height);
        ctx.lineTo(pose[b].x * canvas.width, pose[b].y * canvas.height);
        ctx.stroke();
      }
      ctx.globalAlpha = 1.0;

      // Highlight wrists
      wrists.forEach((wrist, i) => {
        const color = i === 0 ? '#22c55e' : '#f59e0b';
        ctx.beginPath();
        ctx.arc(wrist.x * canvas.width, wrist.y * canvas.height, 10, 0, 2 * Math.PI);
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = color;
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText(i === 0 ? 'L' : 'R', wrist.x * canvas.width - 5, wrist.y * canvas.height - 14);
      });

      // Track wrist history — sort by X so same physical hand stays in same slot
      // Prevents false triggers when pose model swaps left/right assignment
      const sortedWrists = [...wrists].sort((a, b) => a.x - b.x);
      sortedWrists.forEach((wrist, i) => {
        const history = wristHistories[i];
        const bodyCenterX = (pose[LEFT_SHOULDER].x + pose[RIGHT_SHOULDER].x) / 2;
        history.push({ x: wrist.x, y: wrist.y, time: now, hipMidY, shoulderMidY, bodyCenterX });
        const cutoff = now - GESTURE_WINDOW_MS;
        while (history.length > 0 && history[0].time < cutoff) {
          history.shift();
        }
      });

      // Draw wrist trails
      wristHistories.forEach((trail, i) => {
        if (trail.length < 2) return;
        const color = i === 0 ? '#22c55e' : '#f59e0b';
        ctx.beginPath();
        ctx.moveTo(trail[0].x * canvas.width, trail[0].y * canvas.height);
        for (let t = 1; t < trail.length; t++) {
          ctx.lineTo(trail[t].x * canvas.width, trail[t].y * canvas.height);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.5;
        ctx.stroke();
        ctx.globalAlpha = 1.0;
      });

      // -- Gesture detection --

      // 67: both wrists pumping Y in opposite directions
      let yRev0 = 0, yRev1 = 0;
      if (wristHistories[0].length >= 3) yRev0 = countReversals(wristHistories[0].map(p => p.y), minDispY);
      if (wristHistories[1].length >= 3) yRev1 = countReversals(wristHistories[1].map(p => p.y), minDispY);
      const maxYReversals = Math.max(yRev0, yRev1);

      let is67 = false;
      let oppositeRatio = 0;
      if (yRev0 >= REQUIRED_REVERSALS && yRev1 >= REQUIRED_REVERSALS
        && checkBelowShoulderRatio(wristHistories[0], torsoHeight)
        && checkBelowShoulderRatio(wristHistories[1], torsoHeight)) {
        const h0 = wristHistories[0];
        const h1 = wristHistories[1];

        let oppositeCount = 0;
        let totalCount = 0;
        let j = 0;
        for (let i = 1; i < h0.length; i++) {
          while (j < h1.length - 1 && Math.abs(h1[j + 1].time - h0[i].time) < Math.abs(h1[j].time - h0[i].time)) {
            j++;
          }
          if (j === 0) continue;

          let prevJ = 0;
          for (let k = 0; k < h1.length - 1; k++) {
            if (Math.abs(h1[k].time - h0[i - 1].time) < Math.abs(h1[prevJ].time - h0[i - 1].time)) {
              prevJ = k;
            }
          }

          const dy0 = h0[i].y - h0[i - 1].y;
          const dy1 = h1[j].y - h1[prevJ].y;

          if (Math.abs(dy0) > 0.01 && Math.abs(dy1) > 0.01) {
            totalCount++;
            if ((dy0 > 0 && dy1 < 0) || (dy0 < 0 && dy1 > 0)) {
              oppositeCount++;
            }
          }
        }
        oppositeRatio = totalCount > 0 ? oppositeCount / totalCount : 0;
        is67 = oppositeRatio >= 0.4;
      }

      // Rickroll: both wrists sweeping X, no significant Y
      let minXReversals = 0;
      if (wristHistories[0].length >= 3 && wristHistories[1].length >= 3) {
        const xRev0 = countReversals(wristHistories[0].map(p => p.bodyCenterX !== undefined ? p.x - p.bodyCenterX : p.x), minDispX);
        const xRev1 = countReversals(wristHistories[1].map(p => p.bodyCenterX !== undefined ? p.x - p.bodyCenterX : p.x), minDispX);
        minXReversals = Math.min(xRev0, xRev1);
      }

      debugEl.textContent = `Torso: ${(torsoHeight * 100).toFixed(1)}% | minY: ${(minDispY * 100).toFixed(1)}% minX: ${(minDispX * 100).toFixed(1)}% | Y rev: [${yRev0}, ${yRev1}]/${REQUIRED_REVERSALS} opp: ${(oppositeRatio * 100).toFixed(0)}% | X rev: ${minXReversals}/${REQUIRED_REVERSALS}`;

      const rickrollBlocked = yRev0 >= REQUIRED_REVERSALS || yRev1 >= REQUIRED_REVERSALS;
      if (minXReversals >= REQUIRED_REVERSALS && !rickrollBlocked && now - lastGestureTime.rickroll > COOLDOWN_MS) {
        lastGestureTime.rickroll = now;
        statusEl.textContent = 'Status: RICKROLL DETECTED!';
        addLog('Rickroll gesture detected!');
        showAlert('rickroll');
        wristHistories[0] = [];
        wristHistories[1] = [];
      } else if (is67 && now - lastGestureTime['67'] > COOLDOWN_MS) {
        lastGestureTime['67'] = now;
        statusEl.textContent = 'Status: 67 DETECTED!';
        addLog('67 gesture detected!');
        showAlert('67');
        wristHistories[0] = [];
        wristHistories[1] = [];
      } else {
        statusEl.textContent = `Status: Tracking | 67: ${maxYReversals}/${REQUIRED_REVERSALS} | Rickroll: ${minXReversals}/${REQUIRED_REVERSALS}`;
      }
    }

    start();
  </script>
</body>
</html>
